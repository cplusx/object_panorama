experiment_name: edge3d_flow_train
output_dir: /home/devdata/edge3d_data/runs

model: configs/model/edge3d_jit_b32_depth_normal_sparse.yaml

data:
  train: configs/data/edge3d_train.yaml
  val: configs/data/edge3d_val.yaml

train: configs/train/edge3d_train.yaml

lightning:
  accelerator: gpu
  devices: 1
  precision: 32-true
  strategy: auto
  log_every_n_steps: 10
  val_check_interval: 200
  limit_train_batches: null
  limit_val_batches: null

validation:
  num_inference_steps: 20
  inference_dtype: float16
  save_preview_every_n_steps: 0

objective:
  name: flow_matching
  t_min: 0.0
  t_max: 1.0
  noise_scale: 1.0
  condition_type_id: 0
  use_model_rgb: false
  use_model_depth: true
  use_model_normal: true

loss:
  mse_weight: 1.0
  l1_weight: 0.0

pretrained:
  load_jit: false
  public_checkpoint_path: null
  variant: ema1

freeze:
  freeze_t_embedder: false
  freeze_x_embedder: false
  freeze_final_layer: false
  freeze_blocks_before: null