experiment_name: edge3d_flow_train
output_dir: ./runs

model: configs/model/edge3d_jit_b32_depth_normal_sparse.yaml

data:
  train: configs/data/edge3d_train.yaml
  val: configs/data/edge3d_val.yaml

train: configs/train/edge3d_train.yaml

lightning:
  accelerator: gpu
  devices: 2
  precision: 32-true
  strategy: deepspeed_stage_2
  log_every_n_steps: 10
  check_val_every_n_epoch: 1
  limit_train_batches: null
  limit_val_batches: null

wandb:
  enabled: true
  project: edge3d_flow
  name: edge3d_flow_train
  tags:
    - edge3d
    - jit
    - flow_matching
  log_model: false

validation:
  num_inference_steps: 20
  inference_dtype: float16
  cfg_scale: 1.5
  num_val_samples: 4
  save_preview_every_n_epochs: 1
  save_reconstruction: true

objective:
  name: flow_matching
  t_min: 0.0
  t_max: 1.0
  noise_scale: 1.0
  condition_dropout_p: 0.1
  condition_type_id: 0
  use_model_rgb: false
  use_model_depth: true
  use_model_normal: true

loss:
  mse_weight: 1.0
  l1_weight: 0.0

pretrained:
  load_jit: true
  public_checkpoint_path: /home/viplab/jiaxin/object_panorama/pretrained_weights/jit-b-32/checkpoint-last.pth
  variant: ema1

freeze:
  freeze_t_embedder: false
  freeze_x_embedder: false
  freeze_final_layer: false
  freeze_blocks_before: null